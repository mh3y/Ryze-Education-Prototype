# Nginx config for the Ryze Education web container.
#
# Serves the React SPA on / and proxies API calls to the FastAPI container.
# The "api" hostname resolves via Docker Compose's internal DNS.
# TLS is terminated here using Let's Encrypt certs mounted from the host.

upstream ryze_api {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name ryzeeducation.com.au www.ryzeeducation.com.au;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ryzeeducation.com.au www.ryzeeducation.com.au;

    ssl_certificate     /etc/letsencrypt/live/ryzeeducation.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ryzeeducation.com.au/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Proxy: FastAPI (all /api/* — includes /api/auth/*) ──────────────────
    # Auth routes live at /api/auth/... so Discord's redirect to
    # /auth/discord/callback is served as the React SPA (not proxied).
    location /api/ {
        proxy_pass         http://ryze_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── React SPA — all other paths ─────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header  Cache-Control "no-cache";
        }
    }

    # ── Health check ────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
