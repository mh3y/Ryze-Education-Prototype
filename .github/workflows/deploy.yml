name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH & rebuild on VPS
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Pull latest frontend code
            cd "${{ secrets.VPS_APP_DIR }}"
            git pull origin main
            # Move to compose directory
            cd "${{ secrets.VPS_COMPOSE_DIR }}"
            # Load .env if present (picks up DB_PASSWORD if set there)
            set -a && source .env 2>/dev/null || true && set +a
            # DB_PASSWORD is required by compose for variable interpolation even
            # though we only rebuild 'web'. Provide a no-op fallback if missing —
            # the running db container is not touched by this deploy.
            export DB_PASSWORD="${DB_PASSWORD:-unused_by_web_rebuild}"
            # Rebuild only the web container (bot/db/api keep running untouched)
            docker compose up -d --build web
            docker image prune -f
            echo "✅ Deployed $(git -C "${{ secrets.VPS_APP_DIR }}" rev-parse --short HEAD) at $(date)"
