name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH & rebuild on VPS
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Pull latest frontend code
            cd "${{ secrets.VPS_APP_DIR }}"
            git pull origin main
            # Move to compose directory and load existing .env so docker compose
            # can interpolate DB_PASSWORD (already set there from initial VPS setup)
            cd "${{ secrets.VPS_COMPOSE_DIR }}"
            set -a && source .env && set +a
            # Rebuild only the web container (bot/db/api keep running untouched)
            docker compose up -d --build web
            docker image prune -f
            echo "✅ Deployed $(git -C "${{ secrets.VPS_APP_DIR }}" rev-parse --short HEAD) at $(date)"
