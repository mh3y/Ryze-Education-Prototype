<title>Ryze · Progress Report — [Student Name]</title>
<meta name="viewport" content="width=820">
<meta name="ext-resource-dependency" content="../engine/ryze-icon.png" data-resource-id="brandIcon" />
<link rel="preconnect" href="https://fonts.googleapis.com">

<!--
  ═══════════════════════════════════════════════════════════════════
  RYZE EDUCATION — STUDENT PROGRESS REPORT TEMPLATE
  ═══════════════════════════════════════════════════════════════════

  HOW TO USE:
  1. Copy this file and rename it: "Student Name - Progress Report.html"
  2. Copy data/sample-report-data.js and rename it for this student.
  3. Replace the REPORT object below with the student's data.
  4. Open in Chrome to preview.
  5. See HOWTO-PDF.md to export as PDF.

  IMPORTANT:
  - Only edit the REPORT object below.
  - Do NOT edit the engine files (engine/ryze-report.js or engine/ryze-report.css).
  - The engine derives every page, chart, average, and footer automatically.
  ═══════════════════════════════════════════════════════════════════
-->
</head>
<body>
<nav class="pager" id="pager"><b>Progress Report</b></nav>
<div id="report-root"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   STUDENT REPORT DATA
   Edit everything below this line.
   See data/sample-report-data.js for full field reference.
   ═══════════════════════════════════════════════════════════════════ */

const REPORT = {

  brand: {
    name: 'RYZE',
    sub:  'EDUCATION',
    site: 'ryzeeducation.com.au',
    logo: '../engine/ryze-logo.png',
    icon: (window.__resources||{}).brandIcon||'../engine/ryze-icon.png',

  reportType: 'Mid-Term Progress Report',

    metaWeeks:'Wk 1–6',

  // Metrics — add or remove as needed, order matters
  metrics:     ['Performance', 'Understanding', 'Confidence', 'Engagement'],
  growthMetric:'Confidence',   // Hero metric charted and highlighted

  // Snapshot content
  headline:   'Replace with a one-line headline. Wrap metric in {curly braces} to highlight.',
  summary:    'Replace with the overall summary paragraph (01.1). 3–5 sentences.',
  growthNote: 'Replace with the Confidence growth-area paragraph shown in the chart card.',

  strengths: [
    'Key strength one',
    'Key strength two',
    'Key strength three',

  focus: [
    'Focus area one',
    'Focus area two',
    'Focus area three',

  // Lessons — one entry per week
  lessons: [

    {
      week:       1,
      date:       '21 Apr 2026',
      topic:      'Lesson Topic Week 1',
      ref:        '',
      completion: 100,
      ratings: { Performance:4, Understanding:4, Confidence:3, Engagement:4 },
      summary: 'Paste tutor feedback verbatim here.',

    {
      week:       2,

      topic:      'Lesson Topic Week 2',
      ref:        '',
      completion: 100,
      ratings: { Performance:4, Understanding:4, Confidence:4, Engagement:4 },
      summary: 'Paste tutor feedback verbatim here.',
    },

    {
      week:      3,
      date:      '5 May 2026',
      cancelled: true,
      summary:   'No lesson this week. Excluded from progress averages.',

    {
      week:       4,
      date:       '12 May 2026',

      ref:        '',
      completion: 100,

      ref:        '',
      completion: 100,
      ratings: { Performance:4, Understanding:4, Confidence:3, Engagement:4 },
      summary: 'Paste tutor feedback verbatim here.',

    {
      week:       6,
      date:       '26 May 2026',
      topic:      'Lesson Topic Week 6',
      ref:        '',
      completion: 100,
      ratings: { Performance:4, Understanding:4, Confidence:4, Engagement:4 },
      summary: 'Paste tutor feedback verbatim here.',

  ],

  // Overall comment for parents (final page, section 03.2)
  comment: {
    lead: 'Opening sentence — this is italicised.',
    paras: [
      'First paragraph — key observations from lessons.',
      'Second paragraph — growth areas and next steps.',
      'Third paragraph — encouragement and plan going forward.',
    ],
  },

  // Final page bottom band
  nextReport: 'End of Term 2',

};
</script>

<script src="../engine/ryze-report.js"></script>

</html>
