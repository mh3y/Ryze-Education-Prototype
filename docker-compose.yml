services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ryze
      POSTGRES_USER: ryze
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ryze_dev_password}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ryze"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8000"
      DATABASE_URL: "postgresql://ryze:${POSTGRES_PASSWORD:-ryze_dev_password}@db:5432/ryze?schema=public"
      DATABASE_DIRECT_URL: "postgresql://ryze:${POSTGRES_PASSWORD:-ryze_dev_password}@db:5432/ryze?schema=public"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      PORTAL_BASE_URL: "${PORTAL_BASE_URL:-http://localhost:3000}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-}"
      CRON_SECRET: "${CRON_SECRET:-}"
      BOT_API_SECRET: "${BOT_API_SECRET:-}"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ENABLE_DASHBOARD: "true"
        VITE_PORTAL_API_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pg_data:
